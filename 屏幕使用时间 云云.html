<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<title>屏幕使用时间 · 云云</title>
<link rel="stylesheet" href="styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  html, body { margin:0; padding:0; background:#f0eee9; overflow:hidden; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="cloud-mascot.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="tab-today.jsx"></script>
<script type="text/babel" src="tabs-more.jsx"></script>
<script type="text/babel" src="main-window.jsx"></script>
<script type="text/babel" src="floating-widget.jsx"></script>
<script type="text/babel" src="desktop-scene.jsx"></script>

<script type="text/babel" data-presets="react">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "dark": false,
  "mascotKind": "cloud",
  "floatingVariant": "A",
  "minimized": false
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweaks] = React.useState(TWEAK_DEFAULTS);
  const [editMode, setEditMode] = React.useState(false);

  // Tweaks 协议
  React.useEffect(() => {
    const onMsg = (e) => {
      if (!e.data) return;
      if (e.data.type === '__activate_edit_mode')   setEditMode(true);
      if (e.data.type === '__deactivate_edit_mode') setEditMode(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const setKey = (k, v) => {
    setTweaks(t => ({ ...t, [k]: v }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*');
  };

  const darkClass = tweaks.dark ? 'theme-dark' : '';

  return (
    <div className={darkClass}>
      <DesignCanvas>
        {/* Section 1: 主窗口变体 */}
        <DCSection id="main" title="主窗口 · 三种 Tab 状态" subtitle="完整的 Windows 应用体验 — 左侧导航 + 六个功能页">
          <DCArtboard id="main-today" label="A · 今日总览" width={960} height={620}>
            <MainWindow dark={tweaks.dark} mascotKind={tweaks.mascotKind} startTab="today" />
          </DCArtboard>
          <DCArtboard id="main-timeline" label="B · 今天的时光小径" width={960} height={620}>
            <MainWindow dark={tweaks.dark} mascotKind={tweaks.mascotKind} startTab="timeline" />
          </DCArtboard>
          <DCArtboard id="main-apps" label="C · 应用排行榜" width={960} height={620}>
            <MainWindow dark={tweaks.dark} mascotKind={tweaks.mascotKind} startTab="apps" />
          </DCArtboard>
          <DCArtboard id="main-stats" label="D · 周月统计" width={960} height={620}>
            <MainWindow dark={tweaks.dark} mascotKind={tweaks.mascotKind} startTab="stats" />
          </DCArtboard>
          <DCArtboard id="main-focus" label="E · 番茄专注" width={960} height={620}>
            <MainWindow dark={tweaks.dark} mascotKind={tweaks.mascotKind} startTab="focus" />
          </DCArtboard>
          <DCArtboard id="main-settings" label="F · 偏好设置" width={960} height={620}>
            <MainWindow dark={tweaks.dark} mascotKind={tweaks.mascotKind} startTab="settings" />
          </DCArtboard>
        </DCSection>

        {/* Section 2: 悬浮窗形态 —— 变体 A 云云头像 */}
        <DCSection id="pill-a" title="悬浮窗 · 变体 A · 小云朵 pill" subtitle="默认 — 圆形头像 + 状态徽章。最小化时常驻桌面">
          <DCArtboard id="a-pill" label="01 · 收起态" width={560} height={380}>
            <DesktopScene variant="A" state="pill" mood="happy" dark={tweaks.dark} showMainMini />
          </DCArtboard>
          <DCArtboard id="a-tooltip" label="02 · 悬停 tooltip" width={560} height={380}>
            <DesktopScene variant="A" state="tooltip" mood="happy" dark={tweaks.dark} showMainMini />
          </DCArtboard>
          <DCArtboard id="a-card" label="03 · 点击展开" width={560} height={420}>
            <DesktopScene variant="A" state="card" mood="happy" dark={tweaks.dark} />
          </DCArtboard>
          <DCArtboard id="a-menu" label="04 · 右键菜单" width={560} height={420}>
            <DesktopScene variant="A" state="menu" mood="happy" dark={tweaks.dark} />
          </DCArtboard>
          <DCArtboard id="a-alert" label="05 · 超时预警表情" width={560} height={380}>
            <DesktopScene variant="A" state="pill" mood="worried" dark={tweaks.dark} label="已使用超过 1h" />
          </DCArtboard>
        </DCSection>

        {/* Section 3: 悬浮窗变体 B 胶囊条 */}
        <DCSection id="pill-b" title="悬浮窗 · 变体 B · 胶囊条" subtitle="带文字的横向形态 — 更多信息密度">
          <DCArtboard id="b-pill" label="01 · 胶囊默认" width={560} height={380}>
            <DesktopScene variant="B" state="pill" mood="happy" dark={tweaks.dark} showMainMini />
          </DCArtboard>
          <DCArtboard id="b-card" label="02 · 展开卡片" width={560} height={420}>
            <DesktopScene variant="B" state="card" mood="happy" dark={tweaks.dark} />
          </DCArtboard>
          <DCArtboard id="b-sleepy" label="03 · 夜间犯困表情" width={560} height={380}>
            <DesktopScene variant="B" state="pill" mood="sleepy" dark={true} label="该休息啦～" />
          </DCArtboard>
        </DCSection>

        {/* Section 4: 变体 C 站立吉祥物 */}
        <DCSection id="pill-c" title="悬浮窗 · 变体 C · 站立果冻" subtitle="把吉祥物放在桌面上 — 最可爱但占位稍大">
          <DCArtboard id="c-pill" label="01 · 站桌面上" width={560} height={380}>
            <DesktopScene variant="C" state="pill" mood="happy" dark={tweaks.dark} showMainMini />
          </DCArtboard>
          <DCArtboard id="c-card" label="02 · 点开卡片" width={560} height={420}>
            <DesktopScene variant="C" state="card" mood="happy" dark={tweaks.dark} />
          </DCArtboard>
          <DCArtboard id="c-calm" label="03 · 专注模式" width={560} height={380}>
            <DesktopScene variant="C" state="pill" mood="calm" dark={tweaks.dark} label="专注中 · 请勿打扰" />
          </DCArtboard>
        </DCSection>

        {/* Section 5: 吉祥物情绪表 */}
        <DCSection id="moods" title="云云的小情绪" subtitle="根据使用时长和时段自动切换表情">
          <DCArtboard id="mood-happy" label="开心" width={240} height={220}>
            <MoodCard mood="happy" label="开心" caption="总时长合理" note="< 4h 正常工作" />
          </DCArtboard>
          <DCArtboard id="mood-calm" label="平静" width={240} height={220}>
            <MoodCard mood="calm" label="平静" caption="专注模式" note="番茄钟进行中" />
          </DCArtboard>
          <DCArtboard id="mood-sleepy" label="犯困" width={240} height={220}>
            <MoodCard mood="sleepy" label="犯困" caption="深夜还在用" note="建议早点休息" />
          </DCArtboard>
          <DCArtboard id="mood-worried" label="担心" width={240} height={220}>
            <MoodCard mood="worried" label="担心" caption="接近上限" note="限额还剩 15 分钟" />
          </DCArtboard>
          <DCArtboard id="mood-alert" label="警觉" width={240} height={220}>
            <MoodCard mood="alert" label="警觉" caption="超过限额" note="需要你的确认" />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      {editMode && (
        <TweaksPanel tweaks={tweaks} setKey={setKey} />
      )}
    </div>
  );
}

function MoodCard({ mood, label, caption, note }) {
  return (
    <div style={{
      width:'100%', height:'100%',
      background: 'var(--cloud-white)',
      display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
      padding: 16, gap: 6, fontFamily:'var(--font-sans)', color:'var(--ink)'
    }}>
      <CloudMascot size={80} mood={mood} />
      <div style={{ fontFamily:'var(--font-hand)', fontSize: 22, marginTop: 6 }}>{label}</div>
      <div style={{ fontSize: 12, color:'var(--ink-soft)', fontWeight:700 }}>{caption}</div>
      <div style={{ fontSize: 11, color:'var(--ink-mute)' }}>{note}</div>
    </div>
  );
}

function TweaksPanel({ tweaks, setKey }) {
  return (
    <div style={{
      position: 'fixed', bottom: 20, right: 20, width: 260, zIndex: 1000,
      background: '#fff', border: '2px solid #2A2A3C',
      borderRadius: 14, padding: 16,
      boxShadow: '4px 4px 0 #2A2A3C, 0 12px 40px rgba(0,0,0,.2)',
      fontFamily: 'var(--font-sans)', color: '#2A2A3C',
    }}>
      <div style={{ fontFamily: 'var(--font-hand)', fontSize: 22, marginBottom: 12 }}>Tweaks</div>

      <TweakRow label="深色模式">
        <Toggle v={tweaks.dark} on={v=>setKey('dark', v)} />
      </TweakRow>

      <TweakRow label="吉祥物角色">
        <SegCtl opts={[['cloud','☁ 云云'],['jelly','🟣 果冻']]} v={tweaks.mascotKind} on={v=>setKey('mascotKind', v)} />
      </TweakRow>

      <TweakRow label="悬浮窗形态">
        <SegCtl opts={[['A','头像'],['B','胶囊'],['C','站立']]} v={tweaks.floatingVariant} on={v=>setKey('floatingVariant', v)} />
      </TweakRow>

      <div style={{ fontSize: 10, color: '#9A9AB0', marginTop: 8, lineHeight: 1.5 }}>
        改变设置会同步到所有 canvas 上的示例
      </div>
    </div>
  );
}

function TweakRow({ label, children }) {
  return (
    <div style={{ marginBottom: 12 }}>
      <div style={{ fontSize: 11, fontWeight: 700, color: '#5A5A72', marginBottom: 6 }}>{label}</div>
      {children}
    </div>
  );
}

function Toggle({ v, on }) {
  return (
    <button onClick={()=>on(!v)} style={{
      width:42, height:22, border:'2px solid #2A2A3C', borderRadius:12,
      background: v ? '#B8E0D2' : '#ECE6D6', padding:0, cursor:'pointer', position:'relative',
    }}>
      <div style={{
        width:14, height:14, borderRadius:'50%', background:'#fff',
        border:'1.5px solid #2A2A3C',
        position:'absolute', top:2, left: v ? 22 : 2, transition:'left .15s',
      }} />
    </button>
  );
}

function SegCtl({ opts, v, on }) {
  return (
    <div style={{ display:'flex', border:'1.5px solid #2A2A3C', borderRadius:8, overflow:'hidden' }}>
      {opts.map(([key, label], i)=>(
        <button key={key} onClick={()=>on(key)} style={{
          flex:1, padding:'5px 4px', fontSize:11, fontWeight:700,
          border:'none', borderLeft: i?'1.5px solid #2A2A3C':'none',
          background: v===key ? '#C8B6FF' : '#fff', color:'#2A2A3C', cursor:'pointer',
          fontFamily:'inherit',
        }}>{label}</button>
      ))}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
